name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: bun install
      - run: bun run build

      # Replace workspace:* with actual version before publishing
      - name: Resolve workspace versions
        run: |
          CORE_VERSION=$(jq -r .version packages/core/package.json)
          cd packages/redis
          jq --arg v "^$CORE_VERSION" '.dependencies["@kairos-computer/core"] = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish @kairos-computer/core
        run: npm publish packages/core --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @kairos-computer/redis
        run: npm publish packages/redis --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
