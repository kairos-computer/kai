name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Package(s) to publish"
        required: true
        type: choice
        default: both
        options:
          - both
          - core
          - redis

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Determine publish target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TARGET="both"
          else
            TARGET="${{ inputs.target }}"
          fi

          case "$TARGET" in
            both)
              echo "publish_core=true" >> "$GITHUB_OUTPUT"
              echo "publish_redis=true" >> "$GITHUB_OUTPUT"
              ;;
            core)
              echo "publish_core=true" >> "$GITHUB_OUTPUT"
              echo "publish_redis=false" >> "$GITHUB_OUTPUT"
              ;;
            redis)
              echo "publish_core=false" >> "$GITHUB_OUTPUT"
              echo "publish_redis=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid target: $TARGET"
              exit 1
              ;;
          esac

      - run: bun install
      - run: bun run build

      # Replace workspace:* with actual version before publishing redis.
      - name: Resolve workspace versions for redis
        if: steps.target.outputs.publish_redis == 'true'
        run: |
          CORE_VERSION=$(jq -r .version packages/core/package.json)
          cd packages/redis
          jq --arg v "^$CORE_VERSION" '.dependencies["@kairos-computer/core"] = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish @kairos-computer/core
        if: steps.target.outputs.publish_core == 'true'
        run: npm publish --provenance --access public
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @kairos-computer/redis
        if: steps.target.outputs.publish_redis == 'true'
        run: npm publish --provenance --access public
        working-directory: packages/redis
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
