name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      integration:
        description: "Run integration tests (uses API credits)"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run lint
      - run: bun run check
      - run: bun run typecheck
      - run: bun run build
      - run: bun test
        env:
          ANTHROPIC_API_KEY: ${{ inputs.integration && secrets.ANTHROPIC_API_KEY || '' }}
